<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle da Entrada</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Entrada de pessoas no evento</p>
          <input type="text" id="event-title" class="title-input" value="Controle da Entrada" placeholder="Nome do Evento" />
        </div>
        <div class="total-pill">
          <span>Total</span>
          <strong id="header-total">0</strong>
        </div>
      </header>

      <nav class="tabs" aria-label="Abas do aplicativo">
        <button class="tab active" data-tab="entrada" type="button">Entrada</button>
        <button class="tab" data-tab="dashboard" type="button">Dashboard</button>
        <button class="tab" data-tab="logs" type="button">Logs CSV</button>
      </nav>

      <section id="entrada" class="tab-panel active" aria-label="Entrada">
        <div class="counter-panel">
          <div class="counter-display">
            <span>Pessoas no total</span>
            <strong id="main-total">0</strong>
          </div>

          <div class="button-grid">
            <button class="entry-button antecipado" data-entry="antecipado" type="button">
              <span>Entrada de ingressos antecipados</span>
              <strong>+1</strong>
            </button>
            <button class="entry-button hora" data-entry="hora" type="button">
              <span>Entrada de ingressos pagos na hora</span>
              <strong>+1</strong>
            </button>
            <button class="entry-button convidado" data-entry="convidado" type="button">
              <span>Entrada de convidados, idosos e crianças</span>
              <strong>+1</strong>
            </button>
            <button class="entry-button correcao" data-entry="correcao" type="button">
              <span>Correção</span>
              <strong>-1</strong>
            </button>
          </div>
        </div>
      </section>

      <section id="dashboard" class="tab-panel" aria-label="Dashboard">
        <div class="toolbar">
          <button id="download-pdf-button" class="download-button" type="button">Baixar Dashboard (PDF)</button>
        </div>
        <div class="dashboard-grid">
          <article class="metric total">
            <span>Total de pessoas</span>
            <strong id="dashboard-total">0</strong>
          </article>
          <article class="metric">
            <span>Ingressos antecipados</span>
            <strong id="count-antecipado">0</strong>
          </article>
          <article class="metric">
            <span>Pagos na hora</span>
            <strong id="count-hora">0</strong>
          </article>
          <article class="metric">
            <span>Convidados, idosos ou crianças</span>
            <strong id="count-convidado">0</strong>
          </article>
          <article class="metric warning">
            <span>Correções</span>
            <strong id="count-correcao">0</strong>
          </article>
        </div>
      </section>

      <section id="logs" class="tab-panel" aria-label="Logs CSV">
        <div class="toolbar">
          <a class="download-button" href="/api/download.csv">Baixar CSV</a>
          <button id="reset-button" class="danger-button" type="button">Zerar registros</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Horário</th>
                <th>Tipo de entrada</th>
                <th>Variação</th>
              </tr>
            </thead>
            <tbody id="logs-body">
              <tr>
                <td colspan="3" class="empty">Nenhum registro ainda.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
